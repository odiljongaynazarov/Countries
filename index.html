<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries</title>
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <!-- HEADER START -->
    <header class="site-header">
        <div class="site-header-container container">
            <a class="site-header-logo" href="index.html">Where in the world?</a>
            <button class="site-header-thema-toggler" type="button">
                <span class="site-header-thema-toggler-inner">
                    <img src="img/icon-mon.svg" alt="" width="20" height="20">
                    <span class="site-header-thema-toggler-text">Dark Mode</span>
                </span>
            </button>
        </div>
    </header>
    <!-- HEADER END -->

    <!-- MAIN START-->
    <main class="main-content">
        <div class="container">
            <form class="filters" action="https://echo.htmlacademy.ru" method="get">
                <input class="filters-search-input" type="search" name="search" placeholder="Search for a country…"
                    aria-label="Country name" required>
                <select class="filters-region-select" name="region" aria-label="Regions">
                    <option selected disabled>Filters by Region</option>
                    <option>Africa</option>
                    <option>America</option>
                    <option>Asia</option>
                    <option>Europe</option>
                    <option>Oceania</option>
                </select>
            </form>
        </div>
    </main>
    <!-- MAIN END-->

    <!-- FOOTER START -->
    <footer class="footer"></footer>
    <!-- FOOTER END -->
    <script src="js/main.js"></script>
</body>

</html>
